name: parknest

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    tag: "{{.Name}}"

x-restart: &always
  restart: always

x-healthcheck-defaults: &hc-defaults
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 30s

# ─── Secrets (files created by scripts/init-secrets.sh) ──────────────────────
secrets:
  db_password:
    file: ./secrets/db_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  minio_root_password:
    file: ./secrets/minio_root_password.txt

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    <<: *always
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-parknest}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${POSTGRES_DB:-parknest_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    secrets: [db_password]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    networks: [internal]
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parknest} -d ${POSTGRES_DB:-parknest_db}"]

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    <<: *always
    logging: *default-logging
    command: >
      sh -c 'redis-server
        --requirepass "$$(cat /run/secrets/redis_password)"
        --appendonly yes
        --appendfsync everysec
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru'
    secrets: [redis_password]
    volumes:
      - redis_data:/data
    networks: [internal]
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "redis-cli", "-a", "$(cat /run/secrets/redis_password)", "ping"]

  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    <<: *always
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-parknest}
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    secrets: [minio_root_password]
    volumes:
      - minio_data:/data
    networks: [internal]
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "mc", "ready", "local"]

  # ── API (NestJS) ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: ../../docker/api.Dockerfile
      target: production
    image: ${REGISTRY:-ghcr.io}/${IMAGE_REPO:-parknest/parknest}/api:${IMAGE_TAG:-latest}
    <<: *always
    logging: *default-logging
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://${POSTGRES_USER:-parknest}:$(cat /run/secrets/db_password)@postgres:5432/${POSTGRES_DB:-parknest_db}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
    secrets: [db_password, redis_password, jwt_secret, minio_root_password]
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "curl", "-fs", "http://localhost:3001/health"]
    # Run DB migrations before starting — idempotent
    command: >
      sh -c 'npx prisma migrate deploy && node dist/main'

  # ── BullMQ Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./apps/api
      dockerfile: ../../docker/worker.Dockerfile
      target: production
    image: ${REGISTRY:-ghcr.io}/${IMAGE_REPO:-parknest/parknest}/worker:${IMAGE_TAG:-latest}
    <<: *always
    logging: *default-logging
    env_file: .env.production
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DATABASE_URL: postgresql://${POSTGRES_USER:-parknest}:$(cat /run/secrets/db_password)@postgres:5432/${POSTGRES_DB:-parknest_db}
    secrets: [db_password, redis_password, jwt_secret, minio_root_password]
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    deploy:
      replicas: 2   # horizontal scale for queue throughput
      resources:
        limits:
          memory: 512M

  # ── Web (Next.js) ───────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: ../../docker/web.Dockerfile
      target: production
    image: ${REGISTRY:-ghcr.io}/${IMAGE_REPO:-parknest/parknest}/web:${IMAGE_TAG:-latest}
    <<: *always
    logging: *default-logging
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://${DOMAIN:-parknest.com}
    networks: [internal]
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "curl", "-fs", "http://localhost:3000/"]

  # ── Nginx (reverse proxy + TLS termination) ─────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    <<: *always
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    networks: [internal]
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "nginx", "-t"]

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  nginx_cache:
    driver: local

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
