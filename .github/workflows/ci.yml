name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_REPO: ${{ github.repository_owner }}/parknest

jobs:

  # ── Lint + Type-check ────────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install API deps
        run: npm ci
        working-directory: apps/api

      - name: Install Web deps
        run: npm ci
        working-directory: apps/web

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Lint API
        run: npm run lint
        working-directory: apps/api

      - name: Type-check API
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Type-check Web
        run: npx tsc --noEmit
        working-directory: apps/web

  # ── Unit + Integration Tests ──────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: parknest_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports: ["6379:6379"]

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/parknest_test
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      JWT_SECRET: test-secret-ci
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install API deps
        run: npm ci
        working-directory: apps/api

      - name: Generate Prisma client + migrate
        run: |
          npx prisma generate
          npx prisma migrate deploy
        working-directory: apps/api

      - name: Run unit tests
        run: npm test -- --passWithNoTests --forceExit --coverage
        working-directory: apps/api

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: apps/api/coverage
          flags: api
        continue-on-error: true

  # ── Build Docker Images ───────────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: api
            context: apps/api
            dockerfile: docker/api.Dockerfile
          - name: worker
            context: apps/api
            dockerfile: docker/worker.Dockerfile
          - name: web
            context: apps/web
            dockerfile: docker/web.Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/${{ matrix.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: production
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.name }}
