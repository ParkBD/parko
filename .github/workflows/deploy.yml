name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: latest)"
        required: false
        default: latest

env:
  REGISTRY: ghcr.io
  IMAGE_REPO: ${{ github.repository_owner }}/parknest

jobs:

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false   # never cancel in-flight deploys

    steps:
      - uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ] || [ "$TAG" = "latest" ]; then
            TAG="sha-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying tag: $TAG"

      - name: Verify images exist in GHCR
        run: |
          for svc in api worker web; do
            echo "Checking $svc:${{ steps.tag.outputs.tag }}"
            docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/$svc:${{ steps.tag.outputs.tag }} > /dev/null
          done
        env:
          DOCKER_CLI_ACI: 1

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          source:   "docker-compose.prod.yml,docker-compose.monitoring.yml,nginx/nginx.prod.conf,monitoring/"
          target:   "/opt/parknest"
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /opt/parknest

            # Pull new images
            export IMAGE_TAG="${{ steps.tag.outputs.tag }}"
            export REGISTRY="${{ env.REGISTRY }}"
            export IMAGE_REPO="${{ env.IMAGE_REPO }}"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose.prod.yml pull api worker web

            # Zero-downtime rolling restart
            # 1. Start new API, wait for healthy, then stop old
            docker compose -f docker-compose.prod.yml up -d --no-deps --scale worker=2 api worker

            # Wait for API health
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml exec -T api curl -fs http://localhost:3001/health; then
                echo "API healthy after ${i}s"
                break
              fi
              sleep 2
            done

            # Bring up web last
            docker compose -f docker-compose.prod.yml up -d --no-deps web nginx

            # Remove dangling images
            docker image prune -f

            echo "Deploy complete: $IMAGE_TAG"

      - name: Smoke test
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.DEPLOY_DOMAIN }}/health)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test FAILED — HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test PASSED — HTTP $STATUS"

      - name: Notify on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/parknest
            # Rollback: restart with previous image
            docker compose -f docker-compose.prod.yml up -d --no-deps api worker web
            echo "ROLLBACK triggered at $(date)"
