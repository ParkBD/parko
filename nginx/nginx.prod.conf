worker_processes auto;
worker_rlimit_nofile 65535;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
    multi_accept       on;
    use                epoll;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format json_combined escape=json
      '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"request_id":"$request_id"'
      '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 50M;
    server_tokens      off;

    # ── Gzip ───────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_comp_level   6;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/rss+xml font/woff2 image/svg+xml;

    # ── Proxy cache (for Next.js static assets) ────────────────────────────────
    proxy_cache_path /var/cache/nginx
        levels=1:2
        keys_zone=static_cache:10m
        max_size=1g
        inactive=60m
        use_temp_path=off;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:20m  rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=pub_limit:10m  rate=30r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstreams ──────────────────────────────────────────────────────────────
    upstream api {
        server api:3001;
        keepalive 32;
    }

    upstream web {
        server web:3000;
        keepalive 16;
    }

    upstream minio {
        server minio:9000;
        keepalive 8;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ──────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ${DOMAIN};

        # ── TLS ────────────────────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security headers ───────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "SAMEORIGIN"                                  always;
        add_header X-Content-Type-Options     "nosniff"                                     always;
        add_header X-XSS-Protection           "1; mode=block"                               always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(self)" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' wss:" always;
        add_header X-Request-ID               $request_id                                   always;

        limit_conn conn_limit 50;

        # ── API endpoints ──────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;

            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
            proxy_cache_bypass $http_upgrade;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── Auth — stricter rate limit ─────────────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
        }

        # ── Public verification (no-auth endpoints) ────────────────────────────
        location /public/verify/ {
            limit_req zone=pub_limit burst=15 nodelay;
            limit_req_status 429;

            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── MinIO presigned object downloads ──────────────────────────────────
        location /storage/ {
            proxy_pass         http://minio/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;

            # Cache public objects aggressively
            proxy_cache          static_cache;
            proxy_cache_valid    200 1d;
            proxy_cache_use_stale error timeout invalid_header updating;
            add_header           X-Cache-Status $upstream_cache_status;
        }

        # ── Health check (Nginx itself + upstreams) ────────────────────────────
        location /health {
            access_log off;
            proxy_pass http://api/health;
        }

        # ── Next.js static assets — long cache ─────────────────────────────────
        location /_next/static/ {
            proxy_pass   http://web;
            proxy_cache  static_cache;
            proxy_cache_valid 200 7d;
            add_header   Cache-Control "public, max-age=604800, immutable";
            add_header   X-Cache-Status $upstream_cache_status;
        }

        # ── Next.js app ────────────────────────────────────────────────────────
        location / {
            proxy_pass         http://web;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade     $http_upgrade;
            proxy_set_header   Connection  "upgrade";
            proxy_set_header   Host        $host;
            proxy_set_header   X-Real-IP   $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
